{{ define "main" }}
<div class="header-card">
  <h1>{{ hugo.Data.meta.name }}</h1>
  <p class="header-location">{{ hugo.Data.meta.location }}</p>
  <div class="contact-links">
    <a href="mailto:{{ hugo.Data.meta.email }}" class="contact-btn">{{ hugo.Data.meta.email }}</a>
    <a href="{{ hugo.Data.meta.linkedin_url }}" target="_blank" class="contact-btn">LinkedIn</a>
    <a href="{{ hugo.Data.meta.github_url }}" target="_blank" class="contact-btn">GitHub</a>
  </div>
</div>

<div class="home-nav home-nav--single">
  <a href="/cv/" class="nav-card">
    <h2>CV</h2>
    <p>Work experience and qualifications</p>
  </a>
  {{/* Restore when notes are ready:
  <a href="/notes/" class="nav-card">
    <h2>Notes</h2>
    <p>Thoughts and writings</p>
  </a>
  */}}
</div>
{{ end }}
